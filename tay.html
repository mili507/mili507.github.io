    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Berkshire Swash', cursive;
            /* Fondo GIF animado principal (cambia esta URL) */
            background: url('fondo.gif') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;

            align-items: center;
            position: relative;
        }

        .contenedor {

            text-align: center;
            z-index: 2;
        }

            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        /* Cuadro de la frase con imagen de fondo (cambia la URL) */
        #frase {
            background: url('fondo.jpg') repeat, #c7aed2;
            background-size: auto, cover;
            color: white;
            font-size: 28px;
            padding: 40px 30px;
            margin: 20px 0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.5;
            border: 2px solid rgba(255,215,0,0.5);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            font-size: 22px;
            padding: 15px 35px;
            background: #e9c0db;
            color: #000;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            background: #d2aecc;
        }

        button:active {
            transform: scale(0.95);
        }

        /* GIF decorativo en la esquina inferior derecha */
        .gif-inferior {
            position: fixed;
            bottom: 5px;
            right: 10px;
            width: 300px;
            height: auto;
            border-radius: 15px;
            z-index: 10;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .gif-inferior:hover {
            opacity: 1;
        }

        h1 {
            color: rgb(252, 255, 207);
            text-shadow: 3px 3px 6px #000;
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
